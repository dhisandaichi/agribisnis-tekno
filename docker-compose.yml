version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: agritec_db
    environment:
      POSTGRES_USER: agritec_user
      POSTGRES_PASSWORD: agritec_password
      POSTGRES_DB: agritec_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agritec_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss
    container_name: agritec_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
